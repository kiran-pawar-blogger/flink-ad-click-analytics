---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-ui
  namespace: ad-analytics
  labels:
    app: ad-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ad-ui
  template:
    metadata:
      labels:
        app: ad-ui
    spec:
      containers:
        - name: ad-ui
          image: ad-analytics/ad-ui:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ad-ui
  namespace: ad-analytics
  labels:
    app: ad-ui
spec:
  selector:
    app: ad-ui
  ports:
    - port: 3000
      targetPort: 3000
