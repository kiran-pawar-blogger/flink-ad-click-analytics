---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-ui
  namespace: ad-analytics
  labels:
    app: report-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-ui
  template:
    metadata:
      labels:
        app: report-ui
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "3002"
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mongodb 27017; do echo waiting for mongodb; sleep 2; done']
      containers:
        - name: report-ui
          image: ad-analytics/report-ui:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017"
            - name: MONGO_DATABASE
              value: "adclicks"
            - name: MONGO_COLLECTION
              value: "click_aggregates"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: report-ui
  namespace: ad-analytics
  labels:
    app: report-ui
spec:
  selector:
    app: report-ui
  ports:
    - port: 3002
      targetPort: 3002
